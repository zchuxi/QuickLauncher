name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: NuGet Restore (dotnet)
        shell: pwsh
        run: |
          dotnet restore src\QuickLauncher\QuickLauncher.csproj --runtime win-x64
          Write-Host "Restore exit code: $LASTEXITCODE"

      - name: Build with MSBuild (diagnostic)
        id: build
        shell: pwsh
        run: |
          Write-Host "=== Building with MSBuild (detailed) ==="
          msbuild src\QuickLauncher\QuickLauncher.csproj `
            -p:Configuration=Release `
            -p:Platform=x64 `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -p:RuntimeIdentifier=win-x64 `
            -p:SelfContained=true `
            -p:EnableMsixTooling=false `
            -bl:build.binlog `
            -v:detailed 2>&1 | Tee-Object -FilePath build.log
          Write-Host "MSBuild exit code: $LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Upload build log and binlog
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            build.binlog
            src/QuickLauncher/obj/**/input.json
            src/QuickLauncher/obj/**/output.json
          if-no-files-found: warn

      - name: Publish with MSBuild (self-contained, win-x64)
        id: publish
        shell: pwsh
        run: |
          Write-Host "=== Publishing with MSBuild ==="
          msbuild src\QuickLauncher\QuickLauncher.csproj `
            -t:Publish `
            -p:Configuration=Release `
            -p:Platform=x64 `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -p:RuntimeIdentifier=win-x64 `
            -p:SelfContained=true `
            -p:EnableMsixTooling=false `
            -p:PublishDir=publish `
            -v:normal 2>&1 | Tee-Object -FilePath publish.log
          Write-Host "Publish exit code: $LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: List publish output
        shell: pwsh
        run: |
          Write-Host "=== Publish output contents ==="
          Get-ChildItem publish -Recurse | Select-Object FullName, Length | Format-Table -AutoSize
          $exePath = "publish\QuickLauncher.exe"
          if (Test-Path $exePath) {
            Write-Host "Found: $exePath"
          } else {
            Write-Host "ERROR: $exePath not found!"
            Get-ChildItem publish -Filter "*.exe" | ForEach-Object { Write-Host "  EXE: $($_.Name)" }
            exit 1
          }

      - name: Zip artifact
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrEmpty($tag)) { $tag = "v1.0.0" }
          Compress-Archive -Path publish\* -DestinationPath "QuickLauncher-$tag-win-x64.zip"
          Write-Host "Created: QuickLauncher-$tag-win-x64.zip"
          Get-Item "QuickLauncher-$tag-win-x64.zip" | Select-Object Name, Length

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickLauncher-zip
          path: QuickLauncher-*.zip
          if-no-files-found: error

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: QuickLauncher ${{ github.ref_name }}
          body: |
            # QuickLauncher ${{ github.ref_name }}

            鼠标极速启动器 - WinUI 3 环形应用启动器。

            ## 下载与运行

            1. 下载 `QuickLauncher-*-win-x64.zip`
            2. 解压到任意目录
            3. 运行 `QuickLauncher.exe`（无需安装，自包含运行）

            ## 系统要求

            - Windows 10 1809 (17763) 及以上，x64
            - 无需额外安装 .NET 运行时（已自包含）

            ## 功能

            - 环形启动面板（Alt+Space 呼出）
            - 鼠标滚轮切换分类
            - 鼠标边缘手势
            - 系统托盘常驻
          files: QuickLauncher-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
